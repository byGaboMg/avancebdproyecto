<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema22 · Home</title>
    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (gratis) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0f0c29;
            background: linear-gradient(145deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #f0eef8;
            padding: 0 0 40px 0;
        }

        /* scroll personalizado */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a2e;
            border-radius: 12px;
        }

        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 12px;
        }

        /* contenedor general */
        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ===== NAVBAR ===== */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0 12px 0;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(15, 12, 41, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
            transition: box-shadow 0.3s ease;
        }

        .navbar.scrolled {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
        }

        .logo {
            font-size: 3.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f093fb 0%, #8866ea 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradienteLogo 6s ease infinite alternate;
            letter-spacing: -0.5px;
            text-shadow: 0 0 20px rgba(102, 126, 234, 0.25);
        }

        @keyframes gradienteLogo {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 100% 50%;
            }
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
        }

        .search-wrapper {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 40px;
            padding: 4px 12px 4px 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
        }

        .search-wrapper:focus-within {
            background: rgba(255, 255, 255, 0.12);
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
        }

        .search-wrapper i {
            color: #a8a4d4;
            font-size: 0.9rem;
        }

        .search-wrapper input {
            background: transparent;
            border: none;
            padding: 10px 8px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            width: 160px;
            outline: none;
        }

        .search-wrapper input::placeholder {
            color: #9a96c0;
            font-weight: 300;
        }

        .btn-nav {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #f0eef8;
            padding: 8px 18px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.9rem;
            backdrop-filter: blur(4px);
            transition: all 0.25s ease;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.3px;
        }

        .btn-nav i {
            font-size: 1rem;
        }

        .btn-nav:hover {
            background: rgba(102, 126, 234, 0.2);
            border-color: #667eea;
            transform: scale(1.03);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.2);
        }

        .btn-nav.admin {
            border-color: #f5576c;
            background: rgba(245, 87, 108, 0.15);
        }

        .btn-nav.admin:hover {
            background: rgba(245, 87, 108, 0.3);
            border-color: #f5576c;
            box-shadow: 0 8px 25px rgba(245, 87, 108, 0.3);
        }

        /* ===== BOTÓN LIMPIAR ===== */
        .btn-limpiar {
            flex-shrink: 0;
            padding: 8px 16px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #8a86b0;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-limpiar:hover {
            background: rgba(245, 87, 108, 0.1);
            border-color: rgba(245, 87, 108, 0.2);
            color: #f5576c;
            transform: translateY(-2px);
        }

        .btn-limpiar i {
            font-size: 0.7rem;
        }

        /* ===== CATEGORÍAS DESTACADAS ===== */
        .categorias-destacadas {
            margin: 8px 0 16px 0;
            padding: 4px 0;
        }

        .categorias-destacadas .categorias-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 4px;
            flex-wrap: nowrap;
            overflow-x: auto;
            min-width: 0;
            padding-bottom: 4px;
        }

        .categorias-destacadas .categorias-row::-webkit-scrollbar {
            height: 6px;
        }

        .categorias-destacadas .categorias-row::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 12px;
        }

        .categorias-destacadas .categorias-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 4px 0;
            flex: 1;
            min-width: 0;
            justify-content: center;
            align-items: center;
        }

        .categoria-chip {
            flex-shrink: 0;
            padding: 8px 20px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #d0cee8;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: 'Poppins', sans-serif;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(4px);
            user-select: none;
        }

        .categoria-chip i {
            font-size: 0.75rem;
            opacity: 0.6;
            transition: all 0.3s ease;
        }

        .categoria-chip .chip-count {
            font-size: 0.6rem;
            background: rgba(255, 255, 255, 0.06);
            padding: 0 8px;
            border-radius: 20px;
            color: #8a86b0;
            font-weight: 400;
            transition: all 0.3s ease;
        }

        .categoria-chip:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .categoria-chip:hover i {
            opacity: 1;
            transform: scale(1.1);
        }

        .categoria-chip.active {
            background: rgba(102, 126, 234, 0.15);
            border-color: #667eea;
            color: #fff;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.15);
            transform: translateY(-2px);
        }

        .categoria-chip.active i {
            opacity: 1;
        }

        .categoria-chip.active .chip-count {
            background: rgba(255, 255, 255, 0.1);
            color: #a8a4d4;
        }

        /* ===== OCULTAR/MOSTRAR CATEGORÍAS ===== */
        .categorias-destacadas.oculto {
            display: none;
        }

        .categorias-destacadas.visible {
            display: block;
            animation: fadeCategorias 0.4s ease forwards;
        }

        @keyframes fadeCategorias {
            0% {
                opacity: 0;
                transform: translateY(-10px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== CARRUSEL ===== */
        .carousel-wrapper {
            margin: 28px 0 32px 0;
            border-radius: 28px;
            overflow: hidden;
            position: relative;
            background: #1a1a2e;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        .carousel-slides {
            display: flex;
            transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            height: 460px;
        }

        .carousel-item {
            flex: 0 0 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            align-items: flex-end;
        }

        .carousel-item .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0.7) 0%, rgba(0, 0, 0, 0.1) 80%);
        }

        .carousel-item .info {
            position: relative;
            z-index: 3;
            padding: 30px 40px;
            max-width: 65%;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.6s ease 0.2s;
        }

        .carousel-item.active .info {
            transform: translateY(0);
            opacity: 1;
        }

        .carousel-item .info h2 {
            font-size: 2.8rem;
            font-weight: 700;
            text-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
            margin-bottom: 6px;
        }

        .carousel-item .info p {
            font-size: 1rem;
            opacity: 0.85;
            max-width: 550px;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .carousel-controls {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 10;
            pointer-events: none;
        }

        .carousel-controls button {
            pointer-events: all;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            width: 48px;
            height: 48px;
            border-radius: 60px;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .carousel-controls button:hover {
            background: rgba(102, 126, 234, 0.5);
            transform: scale(1.1);
            border-color: #667eea;
        }

        .carousel-dots {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 12;
        }

        .carousel-dots span {
            width: 12px;
            height: 12px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .carousel-dots span.active {
            background: #667eea;
            width: 28px;
            box-shadow: 0 0 16px #667eea;
        }

        /* ===== FILTROS ===== */
        .filtros {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 14px 20px;
            margin: 18px 0 30px 0;
            background: rgba(255, 255, 255, 0.03);
            padding: 14px 20px;
            border-radius: 60px;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            justify-content: center;
        }

        .filtros select,
        .filtros .chip-group {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #f0eef8;
            padding: 8px 16px;
            border-radius: 40px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filtros select:hover,
        .filtros select:focus {
            background: rgba(102, 126, 234, 0.2);
            border-color: #667eea;
        }

        .filtros .chip-group {
            display: flex;
            gap: 6px;
            background: transparent;
            border: none;
            padding: 0;
        }

        .filtros .chip-group button {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #ccc;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filtros .chip-group button.active {
            background: #667eea;
            border-color: #667eea;
            color: #fff;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
        }

        /* ===== FILTER SWITCH (CARTELERA / FUNCIONES) ===== */
        .filter-switch-wrapper {
            display: flex;
            justify-content: center;
            margin: 12px 0 28px 0;
        }

        .filter-switch {
            border: 2px solid #667eea;
            border-radius: 30px;
            position: relative;
            display: flex;
            align-items: center;
            height: 54px;
            width: 400px;
            max-width: 100%;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(6px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        }

        .filter-switch input {
            display: none;
        }

        .filter-switch label {
            flex: 1;
            text-align: center;
            cursor: pointer;
            border: none;
            border-radius: 30px;
            position: relative;
            overflow: hidden;
            z-index: 1;
            transition: all 0.5s;
            font-weight: 500;
            font-size: 1rem;
            padding: 12px 8px;
            color: #7d7d7d;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 0.5px;
        }

        .filter-switch label i {
            margin-right: 8px;
            font-size: 0.9rem;
        }

        .filter-switch .background {
            position: absolute;
            width: 49%;
            height: 42px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            top: 4px;
            left: 4px;
            border-radius: 30px;
            transition: left 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }

        #optionFunciones:checked~.background {
            left: 50%;
        }

        #optionCartelera:checked+label[for="optionCartelera"] {
            color: #fff;
            font-weight: 600;
        }

        #optionFunciones:checked+label[for="optionFunciones"] {
            color: #fff;
            font-weight: 600;
        }

        #optionCartelera:not(:checked)+label[for="optionCartelera"],
        #optionFunciones:not(:checked)+label[for="optionFunciones"] {
            color: #9a96c0;
        }

        .filter-switch label:hover {
            color: #fff;
        }

        /* ===== GRID TARJETAS ===== */
        .grid-peliculas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 28px;
            margin-top: 12px;
        }

        .card-pelicula {
            border-radius: 20px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1);
            cursor: pointer;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
            position: relative;
            transform: translateY(0);
            animation: fadeUp 0.6s ease forwards;
            opacity: 0;
        }

        .card-pelicula:nth-child(1) {
            animation-delay: 0.05s;
        }

        .card-pelicula:nth-child(2) {
            animation-delay: 0.1s;
        }

        .card-pelicula:nth-child(3) {
            animation-delay: 0.15s;
        }

        .card-pelicula:nth-child(4) {
            animation-delay: 0.2s;
        }

        .card-pelicula:nth-child(5) {
            animation-delay: 0.25s;
        }

        .card-pelicula:nth-child(6) {
            animation-delay: 0.3s;
        }

        .card-pelicula:nth-child(7) {
            animation-delay: 0.35s;
        }

        .card-pelicula:nth-child(8) {
            animation-delay: 0.4s;
        }

        .card-pelicula:nth-child(9) {
            animation-delay: 0.45s;
        }

        .card-pelicula:nth-child(10) {
            animation-delay: 0.5s;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-pelicula:hover {
            transform: scale(1.06);
            box-shadow: 0 30px 50px rgba(102, 126, 234, 0.25);
            border-color: rgba(102, 126, 234, 0.3);
        }

        .card-pelicula .poster {
            aspect-ratio: 2 / 3;
            background-size: cover;
            background-position: center;
            position: relative;
            transition: all 0.3s ease;
        }

        .card-pelicula .overlay-card {
            position: absolute;
            inset: 0;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0.85) 0%, rgba(0, 0, 0, 0.2) 80%);
            opacity: 0;
            transition: opacity 0.4s ease;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            color: #fff;
        }

        .card-pelicula:hover .overlay-card {
            opacity: 1;
        }

        .card-pelicula .overlay-card .titulo-over {
            font-weight: 600;
            font-size: 1.2rem;
            margin-bottom: 4px;
        }

        .card-pelicula .overlay-card .sinopsis-over {
            font-size: 0.75rem;
            opacity: 0.8;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-pelicula .overlay-card .meta-over {
            margin-top: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
        }

        .card-pelicula .pie {
            padding: 12px 14px 16px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
        }

        .card-pelicula .pie h4 {
            font-weight: 600;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-pelicula .pie .estrellas {
            color: #f5b342;
            letter-spacing: 2px;
            font-size: 0.8rem;
        }

        /* ===== PRÓXIMAS FUNCIONES ===== */
        .proximas-funciones {
            margin-top: 12px;
            padding: 0;
            background: transparent;
            backdrop-filter: none;
            border: none;
            border-radius: 0;
            animation: fadeUp 0.6s ease forwards;
            opacity: 0;
            animation-delay: 0.3s;
        }

        .proximas-funciones .titulo-seccion {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .proximas-funciones .titulo-seccion i {
            color: #667eea;
            animation: pulse 2s ease infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .funciones-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .funcion-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 16px 18px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            animation: fadeUp 0.5s ease forwards;
            opacity: 0;
            min-height: 90px;
            width: 100%;
        }

        .funcion-card:nth-child(1) {
            animation-delay: 0.1s;
        }

        .funcion-card:nth-child(2) {
            animation-delay: 0.15s;
        }

        .funcion-card:nth-child(3) {
            animation-delay: 0.2s;
        }

        .funcion-card:nth-child(4) {
            animation-delay: 0.25s;
        }

        .funcion-card:nth-child(5) {
            animation-delay: 0.3s;
        }

        .funcion-card:nth-child(6) {
            animation-delay: 0.35s;
        }

        .funcion-card:hover {
            background: rgba(102, 126, 234, 0.08);
            border-color: rgba(102, 126, 234, 0.2);
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
        }

        .funcion-card .funcion-poster {
            width: 60px;
            min-width: 60px;
            height: 80px;
            border-radius: 12px;
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .funcion-card .funcion-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .funcion-card .funcion-info .funcion-titulo {
            font-weight: 600;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .funcion-card .funcion-info .funcion-detalle {
            display: flex;
            gap: 12px;
            font-size: 0.75rem;
            opacity: 0.7;
            flex-wrap: wrap;
        }

        .funcion-card .funcion-info .funcion-detalle i {
            margin-right: 3px;
            color: #667eea;
        }

        .funcion-card .funcion-hora {
            font-weight: 600;
            color: #667eea;
            font-size: 1rem;

    <script>
        // ============================================================
        // CONFIGURACIÓN SUPABASE
        // ============================================================
        const SUPABASE_URL = 'https://jhtgfyvdbcxymcnyaibg.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpodGdmeXZkYmN4eW1jbnlhaWJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NzUyNzYsImV4cCI6MjA5NzE1MTI3Nn0.dX95IwFBrSgwVa0ldSKtWbUISGxDUzvHC6yms_rre2g';
        var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================

        // ============================================================

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const iconMap = { success: 'fa-check-circle', error: 'fa-times-circle', info: 'fa-info-circle' };
            toast.innerHTML = `<i class="fas ${iconMap[type] || 'fa-info-circle'}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('removing');
                setTimeout(() => toast.remove(), 400);
            }, 3500);
        }

        // ============================================================
        // SWITCH ENTRE SECCIONES (con ocultar/mostrar categorías)
        // ============================================================
        document.querySelectorAll('#filterSwitch input').forEach(input => {
            input.addEventListener('change', function () {
                const seccionCartelera = document.getElementById('seccionCartelera');
                const seccionFunciones = document.getElementById('seccionFunciones');
                const categoriasDestacadas = document.getElementById('categoriasDestacadas');

                if (this.id === 'optionCartelera') {
                    seccionCartelera.className = 'seccion-visible';
                    seccionFunciones.className = 'seccion-oculta';
                    categoriasDestacadas.className = 'categorias-destacadas visible';

                    if (!window.funcionesCargadas) {
                        loadProximasFunciones();
                        window.funcionesCargadas = true;
                    }
                } else {
                    seccionCartelera.className = 'seccion-oculta';
                    seccionFunciones.className = 'seccion-visible';
                    categoriasDestacadas.className = 'categorias-destacadas oculto';

                    if (!window.funcionesCargadas) {
                        loadProximasFunciones();
                        window.funcionesCargadas = true;
                    }
                }
            });
        });
        // ============================================================
        // NAVBAR / AUTENTICACIÓN
        // ============================================================
        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            const logoutBtn = document.getElementById('logoutBtn');

            if (session?.user) {
                currentUser = session.user;
                document.getElementById('authLabel').textContent = 'Mi Perfil';
                document.getElementById('authBtn').innerHTML = `<i class="fas fa-user-circle"></i> ${currentUser.email}`;
                if (logoutBtn) logoutBtn.style.display = 'flex';

                const { data: usuario } = await supabase
                    .from('usuario')
                    .select('rol')
                    .eq('id_usuario', currentUser.id)
                    .maybeSingle();
                if (usuario && usuario.rol === 'admin') {
                    document.getElementById('adminBtn').style.display = 'flex';
                } else {
                    document.getElementById('adminBtn').style.display = 'none';
                }
            } else {
                currentUser = null;
                document.getElementById('authLabel').textContent = 'Iniciar Sesión';
                document.getElementById('authBtn').innerHTML = `<i class="fas fa-user"></i> Iniciar Sesión`;
                document.getElementById('adminBtn').style.display = 'none';
                if (logoutBtn) logoutBtn.style.display = 'none';
            }
        }

        async function logout() {
            try {
                const { error } = await supabase.auth.signOut();
                if (error) throw error;
                showToast('¡Hasta luego! 👋', 'success');
                setTimeout(() => {
                    window.location.reload();
                }, 500);
            } catch (error) {
                showToast('Error al cerrar sesión: ' + error.message, 'error');

                window.location.href = 'mis-resenas.html';

                window.location.href = 'login.html';
            }
        });
        document.getElementById('adminBtn').addEventListener('click', () => {
            window.location.href = 'admin.html';
        });

        // ============================================================
        // CARRUSEL
        // ============================================================
        let carouselData = [];

        async function loadCarousel() {
            const { data, error } = await supabase
                .from('pelicula')
                .select('id_pelicula, nombre_pelicula, sinopsis, url_poster')
                .limit(5);
            if (error) { showToast('Error cargando carrusel', 'error'); return; }
            carouselData = data;
            renderCarousel();
        }

        function renderCarousel() {
            const slides = document.getElementById('carouselSlides');
            const dots = document.getElementById('carouselDots');
            slides.innerHTML = '';
            dots.innerHTML = '';
            carouselData.forEach((p, idx) => {
                const div = document.createElement('div');
                div.className = `carousel-item ${idx === 0 ? 'active' : ''}`;
                div.style.backgroundImage = `url(${p.url_poster})`;
                div.innerHTML = `
                    <div class="overlay"></div>
                    <div class="info">
                        <h2>${p.nombre_pelicula}</h2>
                        <p>${p.sinopsis?.slice(0, 120) || ''}…</p>
                    </div>
                `;
                slides.appendChild(div);
                const dot = document.createElement('span');
                dot.className = idx === 0 ? 'active' : '';
                dot.dataset.index = idx;
                dots.appendChild(dot);
            });
            dots.querySelectorAll('span').forEach(d => {
                d.addEventListener('click', () => goToCarousel(parseInt(d.dataset.index)));
            });
            startAutoplay();
        }

        function goToCarousel(index) {
            const items = document.querySelectorAll('.carousel-item');
            const dots = document.querySelectorAll('#carouselDots span');
            if (index < 0) index = items.length - 1;
            if (index >= items.length) index = 0;
            carouselIndex = index;
            items.forEach((el, i) => {
                el.classList.toggle('active', i === index);
            });
            dots.forEach((d, i) => {
                d.classList.toggle('active', i === index);
            });
            const offset = -index * 100;
            document.getElementById('carouselSlides').style.transform = `translateX(${offset}%)`;
        }

        function startAutoplay() {
            if (carouselInterval) clearInterval(carouselInterval);
            carouselInterval = setInterval(() => {
                if (!document.querySelector('.carousel-wrapper:hover')) {
                    goToCarousel(carouselIndex + 1);
                }
            }, 5000);
        }

        document.getElementById('prevSlide').addEventListener('click', () => {
            goToCarousel(carouselIndex - 1);
            startAutoplay();
        });
        document.getElementById('nextSlide').addEventListener('click', () => {
            goToCarousel(carouselIndex + 1);
            startAutoplay();
        });
        document.querySelector('.carousel-wrapper').addEventListener('mouseenter', () => clearInterval(carouselInterval));
        document.querySelector('.carousel-wrapper').addEventListener('mouseleave', startAutoplay);

        // ============================================================
        // CARGAR PELÍCULAS Y FILTROS
        // ============================================================
        async function loadPeliculas() {
            const { data, error } = await supabase
                .from('vista_peliculas')
                .select('*');

            if (error) {
                showToast('Error al cargar películas: ' + error.message, 'error');
                return;
            }

            peliculas = data || [];
            filteredPeliculas = [...peliculas];
            renderGrid(filteredPeliculas);
            populateFilters();
        }

        // ============================================================
        // PRÓXIMAS FUNCIONES
        // ============================================================
        async function loadProximasFunciones() {
            const container = document.getElementById('funcionesGrid');

            try {
                const hoy = new Date().toISOString().split('T')[0];
                const semana = new Date();
                semana.setDate(semana.getDate() + 7);
                const finSemana = semana.toISOString().split('T')[0];

                const { data: funciones, error } = await supabase
                    .from('funcion')
                    .select(`
                        id_funcion,
                        fecha,
                        hora,
                        id_pelicula,
                        pelicula:pelicula (
                            nombre_pelicula,
                            url_poster,
                            sinopsis,
                            director:director (nombre)
                        )
                    `)
                    .gte('fecha', hoy)
                    .lte('fecha', finSemana)
                    .order('fecha', { ascending: true })
                    .order('hora', { ascending: true })
                    .limit(12);

                if (error) throw error;

                if (!funciones || funciones.length === 0) {
                    container.innerHTML = `
                        <div class="empty-funciones">
                            <i class="fas fa-calendar-times"></i>
                            <p>No hay funciones programadas en los próximos días</p>
                            <p style="font-size:0.8rem; opacity:0.5;">Vuelve pronto para más novedades 🎬</p>
                        </div>
                    `;
                    return;
                }

                const funcionesPorDia = {};
                funciones.forEach(f => {
                    const fecha = f.fecha;
                    if (!funcionesPorDia[fecha]) {
                        funcionesPorDia[fecha] = [];
                    }
                    funcionesPorDia[fecha].push(f);
                });

                let html = '';
                const dias = Object.keys(funcionesPorDia).sort();

                dias.forEach(fecha => {
                    const fechaObj = new Date(fecha + 'T00:00:00');
                    const hoyObj = new Date();
                    hoyObj.setHours(0, 0, 0, 0);

                    let labelFecha = fechaObj.toLocaleDateString('es-ES', {
                        weekday: 'long',
                        day: 'numeric',
                        month: 'short'
                    });

                    if (fechaObj.getTime() === hoyObj.getTime()) {
                        labelFecha = `🔥 ${labelFecha}`;
                    }

                    html += `
                        <div style="grid-column: 1 / -1; margin-top: 12px; font-weight: 600; font-size: 1.1rem; color: #667eea; border-bottom: 1px solid rgba(255,255,255,0.04); padding-bottom: 8px;">
                            ${labelFecha}
                        </div>
                    `;

                    funcionesPorDia[fecha].forEach(f => {
                        const peli = f.pelicula;
                        const poster = peli?.url_poster || 'https://via.placeholder.com/60x80/1a1a2e/667eea?text=No+Poster';
                        const titulo = peli?.nombre_pelicula || 'Película sin título';
                        const director = peli?.director?.nombre || 'Director desconocido';
                        const horaFormateada = f.hora?.slice(0, 5) || '--:--';

                        html += `
                            <div class="funcion-card" onclick="window.location.href='detalle.html?id=${f.id_pelicula}'" style="cursor:pointer;">
                                <div class="funcion-poster" style="background-image: url(${poster});"></div>
                                <div class="funcion-info">
                                    <div class="funcion-titulo">${titulo}</div>
                                    <div class="funcion-detalle">
                                        <span><i class="fas fa-user-tie"></i> ${director}</span>
                                    </div>
                                </div>
                                <div class="funcion-hora">
                                    <i class="fas fa-ticket-alt" style="font-size:0.7rem; opacity:0.5;"></i> ${horaFormateada}
                                </div>
                                <!--
                                <div class="funcion-badge" display="none" hidden>
                                    <i class="fas fa-circle" style="font-size:0.4rem; margin-right:4px;"></i> Disponible
                                </div>
                                -->
                            </div>
                        `;
                    });
                });

                container.innerHTML = html;

            } catch (error) {
                console.error('Error al cargar funciones:', error);
                container.innerHTML = `
                    <div class="empty-funciones">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>Error al cargar las funciones</p>
                        <p style="font-size:0.8rem; opacity:0.5;">${error.message}</p>
                    </div>
                `;
            }
        }

        function renderGrid(lista) {
            const grid = document.getElementById('gridPeliculas');
            grid.innerHTML = '';
            lista.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card-pelicula';
                const estrellas = '★'.repeat(Math.round(p.promedio_calificacion || 0)) + '☆'.repeat(5 - Math.round(p
                    .promedio_calificacion || 0));
                card.innerHTML = `
                    <div class="poster" style="background-image: url(${p.url_poster || 'https://via.placeholder.com/300x450/1a1a2e/667eea?text=No+Poster'})">
                        <div class="overlay-card">
                            <div class="titulo-over">${p.nombre_pelicula}</div>
                            <div class="sinopsis-over">${p.sinopsis?.slice(0, 100) || ''}…</div>
                            <div class="meta-over"><span>${p.director || ''}</span><span>${p.ano_lanzamiento || ''}</span></div>
                        </div>
                    </div>
                    <div class="pie">
                        <h4>${p.nombre_pelicula}</h4>
                        <div class="estrellas">${estrellas} <span style="color:#aaa;font-weight:300;font-size:0.7rem;">${p.promedio_calificacion?.toFixed(1) || '0'}</span></div>
                    </div>
                `;
                card.addEventListener('click', () => {
                    window.location.href = `detalle.html?id=${p.id_pelicula}`;
                });
                grid.appendChild(card);
            });
        }

        async function populateFilters() {
            const { data: dirs } = await supabase.from('director').select('id_director, nombre').order('nombre');
            const selDir = document.getElementById('filtroDirector');
            selDir.innerHTML = '<option value="">Todos los Directores</option>';
            dirs?.forEach(d => {
                const opt = document.createElement('option');
                opt.value = d.id_director;
                opt.textContent = d.nombre;
                selDir.appendChild(opt);
            });

            const { data: cats } = await supabase.from('categoria').select('id_categoria, nombre_categoria').order(
                'nombre_categoria');
            const selCat = document.getElementById('filtroCategoria');
            selCat.innerHTML = '<option value="">Todas las Categorías</option>';
            cats?.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id_categoria;
                opt.textContent = c.nombre_categoria;
                selCat.appendChild(opt);
            });

            const anos = [...new Set(peliculas.map(p => p.ano_lanzamiento).filter(Boolean))].sort((a, b) => b - a);
            const selAno = document.getElementById('filtroAno');
            selAno.innerHTML = '<option value="">Todos los Años</option>';
            anos.forEach(a => {
                const opt = document.createElement('option');
                opt.value = a;
                opt.textContent = a;
                selAno.appendChild(opt);
            });
        }

        // ============================================================
        // CATEGORÍAS DESTACADAS (SIN SCROLL, CON WRAP)
        // ============================================================
        async function loadCategoriasDestacadas() {
            const container = document.getElementById('categoriasContainer');

            try {
                const { data: categorias, error } = await supabase
                    .from('categoria')
                    .select(`
                id_categoria,
                nombre_categoria,
                pelicula_categoria ( count )
            `)
                    .order('nombre_categoria');

                if (error) throw error;

                if (!categorias || categorias.length === 0) {
                    container.innerHTML = `<span style="opacity:0.4; font-size:0.85rem;">No hay categorías disponibles</span>`;
                    return;
                }

                // Lista de íconos disponibles
                const iconosDisponibles = [
                    'fa-tag', 'fa-star', 'fa-fire', 'fa-crown', 'fa-mask',
                    'fa-laugh', 'fa-bolt', 'fa-ghost', 'fa-rocket', 'fa-compass',
                    'fa-heart', 'fa-skull', 'fa-dragon', 'fa-globe', 'fa-search',
                    'fa-users', 'fa-shield-halved', 'fa-music', 'fa-film', 'fa-video',
                    'fa-camera', 'fa-gamepad', 'fa-palette', 'fa-meteor', 'fa-sparkles'
                ];

                // Colores degradado para cada categoría (tonos morados/azules)
                const coloresDisponibles = [
                    '#667eea', '#764ba2', '#8b5cf6', '#7c3aed', '#6d28d9',
                    '#5b21b6', '#4f46e5', '#6366f1', '#818cf8', '#a5b4fc',
                    '#c4b5fd', '#ddd6fe', '#a78bfa', '#8b5cf6', '#7c3aed'
                ];

                function getColorPorIndice(index) {
                    return coloresDisponibles[index % coloresDisponibles.length];
                }

                function getIconoPorIndice(index) {
                    return iconosDisponibles[index % iconosDisponibles.length];
                }

                let html = '';
                categorias.forEach((c, index) => {
                    const count = c.pelicula_categoria?.[0]?.count || 0;
                    const icon = getIconoPorIndice(index);
                    const color = getColorPorIndice(index);

                    html += `
                <button class="categoria-chip" data-id="${c.id_categoria}" data-nombre="${c.nombre_categoria}" 
                        style="border-color: ${color}33;">
                    <i class="fas ${icon}" style="color:${color};"></i>
                    ${c.nombre_categoria}
                    <span class="chip-count">${count}</span>
                </button>
            `;
                });

                container.innerHTML = html;

                // Evento click para filtrar por categoría
                container.querySelectorAll('.categoria-chip').forEach(chip => {
                    chip.addEventListener('click', function () {
                        const id = this.dataset.id;

                        this.classList.toggle('active');

                        const selectCat = document.getElementById('filtroCategoria');
                        if (this.classList.contains('active')) {
                            container.querySelectorAll('.categoria-chip').forEach(c => {
                                if (c !== this) c.classList.remove('active');
                            });
                            selectCat.value = id;
                        } else {
                            selectCat.value = '';
                        }

                        selectCat.dispatchEvent(new Event('change'));
                    });
                });

                // ============================================================
                // BOTÓN LIMPIAR - Desactiva todos los filtros de categoría
                // ============================================================
                const btnLimpiar = document.getElementById('btnLimpiarCategorias');
                if (btnLimpiar) {
                    btnLimpiar.addEventListener('click', function () {
                        // Desactivar todos los chips
                        container.querySelectorAll('.categoria-chip').forEach(c => {
                            c.classList.remove('active');
                        });

                        // Limpiar el select de categorías
                        const selectCat = document.getElementById('filtroCategoria');
                        selectCat.value = '';

                        // Disparar el evento change para actualizar el grid
                        selectCat.dispatchEvent(new Event('change'));

                        // Feedback visual
                        showToast('Filtros de categoría limpiados ✨', 'info');
                    });
                }

            } catch (error) {
                console.error('Error al cargar categorías:', error);
                container.innerHTML = `<span style="opacity:0.4; font-size:0.85rem;">Error al cargar categorías</span>`;
            }
        }


        // ============================================================
        // FILTROS
        // ============================================================
        async function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            const dir = document.getElementById('filtroDirector').value;
            const cat = document.getElementById('filtroCategoria').value;
            const estrellaMin = parseInt(document.querySelector('#filtroEstrellas .active')?.dataset.min || 0);
            const ano = document.getElementById('filtroAno').value;

            let resultados = [...peliculas];

            if (search) {
                resultados = resultados.filter(p =>
                    p.nombre_pelicula.toLowerCase().includes(search)
                );
            }

            if (dir) {
                resultados = resultados.filter(p =>
                    p.id_director == dir
                );
            }

            if (ano) {
                resultados = resultados.filter(p =>
                    p.ano_lanzamiento == ano
                );
            }

            if (estrellaMin > 0) {
                resultados = resultados.filter(p =>
                    (p.promedio_calificacion || 0) >= estrellaMin
                );
            }

            if (cat) {
                const { data: pelisCat, error } = await supabase
                    .from('pelicula_categoria')
                    .select('id_pelicula')
                    .eq('id_categoria', parseInt(cat));

                if (error) {
                    showToast('Error al filtrar por categoría', 'error');
                    return;
                }

                if (pelisCat && pelisCat.length > 0) {
                    const ids = pelisCat.map(p => p.id_pelicula);
                    resultados = resultados.filter(p => ids.includes(p.id_pelicula));
                } else {
                    resultados = [];
                }
            }

            filteredPeliculas = resultados;
            renderGrid(filteredPeliculas);
        }

        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('filtroDirector').addEventListener('change', applyFilters);
        document.getElementById('filtroCategoria').addEventListener('change', applyFilters);
        document.getElementById('filtroAno').addEventListener('change', applyFilters);
        document.querySelectorAll('#filtroEstrellas button').forEach(btn => {
            btn.addEventListener('click', function () {
                document.querySelectorAll('#filtroEstrellas button').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                applyFilters();
            });
        });

        // ============================================================
        // INIT
        // ============================================================
        async function init() {
            await checkAuth();
            await loadCarousel();
            await loadPeliculas();
            await loadCategoriasDestacadas();
            // Las funciones se cargan cuando el usuario cambia al tab "Funciones"
            window.funcionesCargadas = false;
        }
        init();

        window.addEventListener('scroll', () => {
            document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 20);
        });
    </script>
