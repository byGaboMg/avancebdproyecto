<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema22 · Detalle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0f0c29;
            background: linear-gradient(145deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #f0eef8;
        }

        /* scroll */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a2e;
            border-radius: 12px;
        }

        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 12px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px 40px;
        }

        /* ===== HEADER CON POSTER ===== */
        .hero {
            position: relative;
            min-height: 60vh;
            background-size: cover;
            background-position: center top;
            display: flex;
            align-items: flex-end;
            border-radius: 0 0 48px 48px;
            margin: 0 -24px 32px -24px;
            padding: 40px 40px 50px 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(0deg, rgba(15, 12, 41, 0.95) 0%, rgba(15, 12, 41, 0.3) 60%, rgba(0, 0, 0, 0.1) 100%);
            border-radius: 0 0 48px 48px;
        }

        .hero-content {
            position: relative;
            z-index: 3;
            max-width: 70%;
        }

        .hero-content h1 {
            font-size: 4rem;
            font-weight: 700;
            text-shadow: 0 8px 30px rgba(0, 0, 0, 0.7);
            line-height: 1.1;
            margin-bottom: 8px;
            animation: fadeUp 0.8s ease forwards;
        }

        .hero-content .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 18px 24px;
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 12px;
            animation: fadeUp 0.8s ease 0.1s forwards;
            opacity: 0;
        }

        .hero-content .meta i {
            margin-right: 6px;
            color: #667eea;
        }

        .hero-content .estrellas-hero {
            font-size: 2rem;
            color: #f5b342;
            animation: latido 1.2s ease infinite alternate;
            display: inline-block;
        }

        @keyframes latido {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.08);
                text-shadow: 0 0 30px rgba(245, 179, 66, 0.3);
            }
        }

        .hero-content .estrellas-hero span {
            font-size: 1.2rem;
            color: #ccc;
            margin-left: 10px;
            font-weight: 300;
        }

        /* ===== BOTÓN VOLVER ===== */
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            padding: 10px 24px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 28px;
            backdrop-filter: blur(4px);
        }

        .btn-back:hover {
            background: rgba(102, 126, 234, 0.2);
            border-color: #667eea;
            transform: scale(1.03);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.2);
        }

        /* ===== SECCIONES ===== */
        .seccion {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 24px;
            padding: 24px 28px;
            margin-bottom: 28px;
            animation: fadeUp 0.6s ease forwards;
            opacity: 0;
        }

        .seccion:nth-child(1) {
            animation-delay: 0.1s;
        }

        .seccion:nth-child(2) {
            animation-delay: 0.2s;
        }

        .seccion:nth-child(3) {
            animation-delay: 0.3s;
        }

        .seccion:nth-child(4) {
            animation-delay: 0.4s;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .seccion h2 {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .seccion h2 i {
            color: #667eea;
        }

        .chip-categoria {
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
            background: rgba(102, 126, 234, 0.15);
            border: 1px solid rgba(102, 126, 234, 0.15);
            color: #ccc;
            font-size: 0.8rem;
            margin: 4px 6px 4px 0;
            transition: all 0.2s ease;
        }

        .chip-categoria:hover {
            background: rgba(102, 126, 234, 0.3);
            transform: scale(1.05);
        }

        .horario-badge {
            display: inline-block;
            background: rgba(74, 222, 128, 0.12);
            border: 1px solid rgba(74, 222, 128, 0.2);
            color: #4ade80;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            animation: pulse 2s ease infinite;
            margin: 4px 8px 4px 0;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.2);
            }

            70% {
                box-shadow: 0 0 0 8px rgba(74, 222, 128, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(74, 222, 128, 0);
            }
        }

        /* ===== RESEÑAS ===== */
        .resena-item {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 14px;
            border-left: 3px solid #667eea;
            animation: fadeUp 0.5s ease forwards;
            opacity: 0;
        }

        .resena-item .resena-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 6px;
        }

        .resena-item .avatar {
            width: 40px;
            height: 40px;
            border-radius: 60px;
            background: #667eea;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.1rem;
            color: #fff;
            flex-shrink: 0;
        }

        .resena-item .resena-usuario {
            font-weight: 600;
        }

        .resena-item .resena-estrellas {
            color: #f5b342;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .resena-item .resena-texto {
            margin-top: 4px;
            opacity: 0.85;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* ===== FORMULARIO RESEÑA ===== */
        .form-resena {
            margin-top: 16px;
        }

        .form-resena .estrellas-input {
            display: flex;
            gap: 8px;
            font-size: 2rem;
            color: #555;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .form-resena .estrellas-input i {
            transition: all 0.2s ease;
        }

        .form-resena .estrellas-input i.active {
            color: #f5b342;
            text-shadow: 0 0 20px rgba(245, 179, 66, 0.3);
            transform: scale(1.1);
        }

        .form-resena textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 14px 18px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            color: #fff;
            resize: vertical;
            min-height: 80px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-resena textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.1);
        }

        .form-resena .btn-enviar {
            margin-top: 12px;
            padding: 12px 32px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 60px;
            color: #fff;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .form-resena .btn-enviar:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.3);
        }

        .form-resena .btn-enviar:active {
            transform: scale(0.96);
        }

        .form-resena .btn-enviar:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .check-anim {
            animation: checkPop 0.5s ease forwards;
        }

        @keyframes checkPop {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }

            50% {
                transform: scale(1.3);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* toast */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .toast {
            background: rgba(20, 20, 40, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px 24px;
            border-radius: 60px;
            color: #fff;
            font-weight: 500;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            animation: slideDown 0.5s ease forwards;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.95rem;
        }

        .toast i {
            font-size: 1.2rem;
        }

        .toast.success i {
            color: #4ade80;
        }

        .toast.error i {
            color: #f87171;
        }

        .toast.info i {
            color: #60a5fa;
        }

        @keyframes slideDown {
            0% {
                opacity: 0;
                transform: translateY(-40px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .toast.removing {
            animation: fadeOut 0.4s ease forwards;
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            100% {
                opacity: 0;
                transform: scale(0.8);
            }
        }

        @media (max-width: 700px) {
            .hero {
                min-height: 40vh;
                padding: 30px 20px;
            }

            .hero-content h1 {
                font-size: 2.2rem;
            }

            .hero-content {
                max-width: 100%;
            }

            .hero-content .estrellas-hero {
                font-size: 1.5rem;
            }

            .seccion {
                padding: 18px 16px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- BOTÓN VOLVER -->
        <button class="btn-back" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i> Volver al
            home</button>

        <!-- HERO -->
        <div class="hero" id="hero"></div>

        <!-- CONTENIDO -->
        <div id="detalleContent">
            <!-- secciones se inyectan con JS -->
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // ============================================================
        // SUPABASE
        // ============================================================
        const SUPABASE_URL = 'https://jhtgfyvdbcxymcnyaibg.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpodGdmeXZkYmN4eW1jbnlhaWJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1NzUyNzYsImV4cCI6MjA5NzE1MTI3Nn0.dX95IwFBrSgwVa0ldSKtWbUISGxDUzvHC6yms_rre2g';
        var supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        // TOASTS
        // ============================================================
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const iconMap = { success: 'fa-check-circle', error: 'fa-times-circle', info: 'fa-info-circle' };
            toast.innerHTML = `<i class="fas ${iconMap[type] || 'fa-info-circle'}"></i> ${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('removing');
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        }

        // ============================================================
        // OBTENER ID DE URL
        // ============================================================
        function getParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        const peliculaId = getParam('id');

        // ============================================================
        // CARGAR DATOS
        // ============================================================
        let peliculaData = null;
        let currentUser = null;

        async function loadDetalle() {
            if (!peliculaId) {
                showToast('ID de película no válido', 'error');
                return;
            }

            // Obtener usuario actual
            const { data: { session } } = await supabase.auth.getSession();
            if (session?.user) currentUser = session.user;

            // 1. Película (vista_peliculas)
            const { data: peli, error: errPeli } = await supabase
                .from('vista_peliculas')
                .select('*')
                .eq('id_pelicula', peliculaId)
                .maybeSingle();

            if (errPeli || !peli) {
                showToast('Película no encontrada', 'error');
                return;
            }
            peliculaData = peli;

            // 2. Director, categorías, funciones, reseñas
            const [directorRes, categoriasRes, funcionesRes, resenasRes] = await Promise.all([
                supabase.from('director').select('nombre').eq('id_director', peli.id_director).maybeSingle(),
                supabase
                    .from('pelicula_categoria')
                    .select('categoria(nombre_categoria)')
                    .eq('id_pelicula', peli.id_pelicula),
                supabase
                    .from('funcion')
                    .select('fecha, hora')
                    .eq('id_pelicula', peli.id_pelicula)
                    .order('fecha', { ascending: true })
                    .limit(5),
                supabase
                    .from('vista_resenas')
                    .select('*')
                    .eq('id_pelicula', peli.id_pelicula)
                    .order('id_resena', { ascending: false })
            ]);

            const director = directorRes.data?.nombre || 'Desconocido';
            const categorias = categoriasRes.data?.map(item => item.categoria?.nombre_categoria).filter(Boolean) || [];
            const funciones = funcionesRes.data || [];
            const resenas = resenasRes.data || [];

            // Renderizar
            renderHero(peli, director);
            renderDetalle(peli, director, categorias, funciones, resenas);
        }

        // ============================================================
        // RENDER HERO
        // ============================================================
        function renderHero(peli, director) {
            const hero = document.getElementById('hero');
            hero.style.backgroundImage = `url(${peli.url_poster || 'https://via.placeholder.com/1200x600/1a1a2e/667eea?text=No+Poster'})`;
            const estrellas = '★'.repeat(Math.round(peli.promedio_calificacion || 0)) + '☆'.repeat(5 - Math.round(peli.promedio_calificacion || 0));
            hero.innerHTML = `
        <div class="hero-content">
          <h1>${peli.nombre_pelicula}</h1>
          <div class="meta">
            <span><i class="fas fa-calendar-alt"></i> ${peli.ano_lanzamiento || 'N/A'}</span>
            <span><i class="fas fa-globe-americas"></i> ${peli.pais || 'N/A'}</span>
            <span><i class="fas fa-user-tie"></i> ${director}</span>
          </div>
          <div class="estrellas-hero">
            ${estrellas} <span>${peli.promedio_calificacion?.toFixed(1) || '0'}</span>
          </div>
        </div>
      `;
        }

        // ============================================================
        // RENDER DETALLE COMPLETO
        // ============================================================
        function renderDetalle(peli, director, categorias, funciones, resenas) {
            const container = document.getElementById('detalleContent');
            let html = '';

            // Sinopsis + ficha
            html += `
        <div class="seccion">
          <h2><i class="fas fa-align-left"></i> Sinopsis</h2>
          <p style="line-height:1.7; opacity:0.9;">${peli.sinopsis || 'Sin sinopsis disponible'}</p>
          ${peli.ficha ? `<p style="margin-top:12px; opacity:0.7; font-size:0.9rem;"><i class="fas fa-info-circle"></i> ${peli.ficha}</p>` : ''}
        </div>
      `;

            // Categorías
            if (categorias.length) {
                html += `
          <div class="seccion">
            <h2><i class="fas fa-tags"></i> Categorías</h2>
            <div>${categorias.map(c => `<span class="chip-categoria">${c}</span>`).join('')}</div>
          </div>
        `;
            }

            // Funciones
            if (funciones.length) {
                html += `
          <div class="seccion">
            <h2><i class="fas fa-clock"></i> Próximas Funciones</h2>
            <div>${funciones.map(f => {
                    const fecha = new Date(f.fecha).toLocaleDateString('es-ES', { weekday: 'short', day: 'numeric', month: 'short' });
                    return `<span class="horario-badge"><i class="fas fa-ticket-alt"></i> ${fecha} · ${f.hora.slice(0, 5)}</span>`;
                }).join('')}</div>
          </div>
        `;
            }

            // Reseñas
            html += `
        <div class="seccion" id="seccionResenas">
          <h2><i class="fas fa-comment-dots"></i> Reseñas (${resenas.length})</h2>
          <div id="listaResenas">
            ${resenas.length ? resenas.map((r, idx) => `
              <div class="resena-item" style="animation-delay: ${idx * 0.05}s;">
                <div class="resena-header">
                  <div class="avatar">${r.usuario ? r.usuario.charAt(0).toUpperCase() : 'U'}</div>
                  <span class="resena-usuario">${r.usuario || 'Anónimo'}</span>
                  <span class="resena-estrellas">${'★'.repeat(r.puntaje || 0)}${'☆'.repeat(5 - (r.puntaje || 0))}</span>
                </div>
                <div class="resena-texto">${r.resena || 'Sin comentario'}</div>
              </div>
            `).join('') : '<p style="opacity:0.6;">No hay reseñas aún. ¡Sé el primero!</p>'}
          </div>
          ${currentUser ? `
            <div class="form-resena" style="margin-top:24px; border-top: 1px solid rgba(255,255,255,0.06); padding-top:20px;">
              <h4 style="margin-bottom:10px; font-weight:400;"><i class="fas fa-star" style="color:#f5b342;"></i> Deja tu reseña</h4>
              <div class="estrellas-input" id="estrellasInput">
                <i class="far fa-star" data-val="1"></i>
                <i class="far fa-star" data-val="2"></i>
                <i class="far fa-star" data-val="3"></i>
                <i class="far fa-star" data-val="4"></i>
                <i class="far fa-star" data-val="5"></i>
              </div>
              <textarea id="resenaText" placeholder="Comparte tu opinión..."></textarea>
              <button class="btn-enviar" id="btnEnviarResena"><i class="fas fa-paper-plane"></i> Enviar</button>
            </div>
          ` : '<p style="margin-top:18px; opacity:0.6;"><i class="fas fa-lock"></i> Inicia sesión para dejar una reseña</p>'}
        </div>
      `;

            container.innerHTML = html;

            // ========== LÓGICA ESTRELLAS ==========
            const estrellasInput = document.getElementById('estrellasInput');
            let selectedStars = 0;
            if (estrellasInput) {
                const icons = estrellasInput.querySelectorAll('i');
                icons.forEach(icon => {
                    icon.addEventListener('click', function () {
                        selectedStars = parseInt(this.dataset.val);
                        icons.forEach(i => {
                            const val = parseInt(i.dataset.val);
                            if (val <= selectedStars) {
                                i.className = 'fas fa-star active';
                            } else {
                                i.className = 'far fa-star';
                            }
                        });
                    });
                    icon.addEventListener('mouseenter', function () {
                        const val = parseInt(this.dataset.val);
                        icons.forEach(i => {
                            const v = parseInt(i.dataset.val);
                            if (v <= val) i.className = 'fas fa-star';
                            else i.className = 'far fa-star';
                        });
                    });
                    icon.addEventListener('mouseleave', function () {
                        icons.forEach(i => {
                            const v = parseInt(i.dataset.val);
                            if (v <= selectedStars) i.className = 'fas fa-star active';
                            else i.className = 'far fa-star';
                        });
                    });
                });
            }

            // ========== ENVIAR RESEÑA ==========
            const btnEnviar = document.getElementById('btnEnviarResena');
            if (btnEnviar) {
                btnEnviar.addEventListener('click', async function () {
                    const texto = document.getElementById('resenaText').value.trim();
                    if (!selectedStars) {
                        showToast('Selecciona una calificación', 'error');
                        return;
                    }
                    this.disabled = true;
                    this.innerHTML = '<span class="spinner" style="display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.2);border-top:2px solid #fff;border-radius:50%;animation:spin 0.8s linear infinite;"></span> Enviando...';

                    try {
                        const { error } = await supabase
                            .from('resena')
                            .insert({
                                puntaje: selectedStars,
                                resena: texto || null,
                                id_usuario: currentUser.id,
                                id_pelicula: parseInt(peliculaId)
                            });
                        if (error) {
                            showToast('Error al enviar: ' + error.message, 'error');
                            this.disabled = false;
                            this.innerHTML = '<i class="fas fa-paper-plane"></i> Enviar';
                            return;
                        }
                        showToast('¡Reseña publicada! ✨', 'success');
                        // Animación check
                        this.innerHTML = '<i class="fas fa-check-circle" style="font-size:1.2rem;"></i> ¡Enviado!';
                        this.classList.add('check-anim');
                        setTimeout(() => {
                            window.location.reload();
                        }, 800);
                    } catch (err) {
                        showToast('Error inesperado', 'error');
                        this.disabled = false;
                        this.innerHTML = '<i class="fas fa-paper-plane"></i> Enviar';
                    }
                });
            }
        }

        // ============================================================
